services:
  web:
    image: node:22-bookworm
    working_dir: /app
    ports:
      - "5770:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    command: >
      sh -c "npm ci && npm run dev -- --hostname 0.0.0.0"

volumes:
  node_modules:
  next_cache:
